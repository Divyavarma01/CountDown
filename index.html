<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish Countdown Timer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .timer-card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .timer {
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 20px 0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        input {
            border-radius: 10px !important;
            text-align: center;
        }

        .btn-custom {
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: 500;
        }

        h2 {
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="timer-card">
    <h2>⏳ Countdown Timer</h2>

    <input type="number" id="minutes" class="form-control mb-3" placeholder="Enter minutes">

    <div class="timer" id="display">00:00</div>

    <button class="btn btn-success btn-custom m-2" onclick="startTimer()">Start</button>
    <button class="btn btn-warning btn-custom m-2" onclick="stopTimer()">Stop</button>
    <button class="btn btn-danger btn-custom m-2" onclick="resetTimer()">Reset</button>
</div>

<script>
    let countdown;
    let timeLeft = 0;
    let isRunning = false;

    function startTimer() {
        const minutes = document.getElementById("minutes").value;

        // If timer is not started yet, set time
        if (!isRunning) {
            if (timeLeft === 0) {
                if (minutes === "" || minutes <= 0) {
                    alert("Please enter valid minutes");
                    return;
                }
                timeLeft = minutes * 60;
            }

            isRunning = true;

            countdown = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;

                document.getElementById("display").innerHTML =
                    `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    alert("⏰ Time's Up!");
                }

                timeLeft--;
            }, 1000);
        }
    }

    function stopTimer() {
        clearInterval(countdown);
        isRunning = false;
    }

    function resetTimer() {
        clearInterval(countdown);
        timeLeft = 0;
        isRunning = false;
        document.getElementById("display").innerHTML = "00:00";
        document.getElementById("minutes").value = "";
    }
</script>

</body>
</html>
